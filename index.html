            </Float>
          </group>

          {ARTWORKS.map((img) => (
            <CustomImage key={img.id} data={img} onClick={onImageClick} />
          ))}

          <Sparkles count={150} scale={[12, 12, 25]} size={3} speed={0.3} opacity={0.4} color="#a1a1aa" position={[0, 0, -10]} />
        </>
      )
    }

    // --- Componentes de Interface ---

    // Botão Reutilizável
    const Button = ({ children, onClick, variant = 'primary', className = '' }) => {
      const baseStyle = "inline-flex items-center justify-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 outline-none focus:ring-2 focus:ring-zinc-500 focus:ring-offset-2 focus:ring-offset-black disabled:opacity-50 disabled:cursor-not-allowed";
      const variants = {
        primary: "bg-white text-black hover:bg-zinc-200 shadow-[0_0_20px_-5px_rgba(255,255,255,0.3)]",
        secondary: "bg-zinc-900 border border-zinc-800 text-zinc-300 hover:text-white hover:border-zinc-700 hover:bg-zinc-800/50",
        ghost: "text-zinc-400 hover:text-white hover:bg-white/5"
      };
      return (
        <button onClick={onClick} className={`${baseStyle} ${variants[variant]} ${className}`}>
          {children}
        </button>
      );
    };

    const NavBar = ({ view, setView, cartCount }) => (
      <nav className="fixed top-0 left-0 right-0 z-40 flex items-center justify-between p-6 md:px-10 md:py-8 pointer-events-none">
        <div className="flex flex-col gap-1 pointer-events-auto cursor-pointer" onClick={() => setView('home')}>
          <h1 className="text-lg font-semibold tracking-tight text-white leading-none">CASTRO ILUSTRA</h1>
          <span className="text-xs uppercase tracking-[0.2em] text-zinc-500 font-medium">Designer Gráfico</span>
        </div>

        <div className="flex items-center gap-6 pointer-events-auto bg-black/50 backdrop-blur-md px-6 py-2.5 rounded-full border border-white/5 shadow-2xl">
          <button onClick={() => setView('home')} className={`text-xs font-medium uppercase tracking-wider transition-colors ${view === 'home' ? 'text-white' : 'text-zinc-500 hover:text-zinc-300'}`}>Portfólio</button>
          <button onClick={() => setView('about')} className={`text-xs font-medium uppercase tracking-wider transition-colors ${view === 'about' ? 'text-white' : 'text-zinc-500 hover:text-zinc-300'}`}>Sobre</button>
          <button onClick={() => setView('media')} className={`text-xs font-medium uppercase tracking-wider transition-colors ${view === 'media' ? 'text-white' : 'text-zinc-500 hover:text-zinc-300'}`}>Mídia</button>
          <div className="w-px h-3 bg-zinc-800"></div>
          <button onClick={() => setView('cart')} className={`relative text-zinc-400 hover:text-white transition-colors flex items-center`}>
            <span className="iconify" data-icon="lucide:briefcase" data-width="18" data-stroke-width="1.5"></span>
            {cartCount > 0 && (
              <span className="absolute -top-1 -right-1 w-2 h-2 bg-white rounded-full"></span>
            )}
          </button>
        </div>
      </nav>
    );

    const ProductModal = ({ item, isOpen, onClose, onAdd, onGoToCart }) => {
      if (!isOpen || !item) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
          <div className="absolute inset-0 bg-black/80 backdrop-blur-sm transition-opacity" onClick={onClose}></div>
          <motion.div
            initial={{ opacity: 0, scale: 0.95, y: 10 }}
            animate={{ opacity: 1, scale: 1, y: 0 }}
            exit={{ opacity: 0, scale: 0.95, y: 10 }}
            transition={{ duration: 0.2, ease: "easeOut" }}
            className="relative w-full max-w-4xl"
          >
            <button onClick={onClose} className="absolute -top-12 right-0 text-zinc-400 hover:text-white transition-colors p-2 z-10">
              <span className="iconify" data-icon="lucide:x" data-width="24"></span>
            </button>
            <div className="w-full bg-zinc-950 border border-white/10 rounded-2xl overflow-hidden shadow-2xl grid md:grid-cols-2">
              <div className="relative h-64 md:h-auto bg-zinc-900 overflow-hidden group">
                <img src={item.url} alt={item.title} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
              </div>

              <div className="p-8 md:p-10 flex flex-col justify-between">
                <div>
                  <div className="flex items-start justify-between mb-2">
                    <h2 className="text-2xl md:text-3xl font-semibold text-white tracking-tight">{item.title}</h2>
                    <span className="px-3 py-1 bg-white/5 border border-white/10 rounded-full text-sm text-zinc-300">Projeto</span>
                  </div>
                  <p className="text-zinc-500 text-sm leading-relaxed mb-6">{item.desc}</p>
                </div>

                <div className="flex flex-col gap-3">
                  <Button onClick={() => window.open(item.instagramUrl, '_blank')} className="w-full">
                    <span className="iconify" data-icon="lucide:instagram" data-width="16"></span>

                    <Button variant="secondary" onClick={() => onAdd(item)} className="w-full flex-1">
                      <span className="iconify" data-icon="lucide:star" data-width="16"></span>

                      Seleção
                      <span className="iconify" data-icon="lucide:arrow-right" data-width="16"></span>
                    </Button>
                  </div>
                </div>
              </div>
            </div>
          </motion.div>
        </div>
      );
    };

    const AboutPage = ({ onClose, showClose = true }) => (
      <motion.div
        initial={{ opacity: 0, y: 50 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: 50 }}
        className="fixed inset-0 z-40 bg-black/90 backdrop-blur-xl overflow-y-auto cursor-pointer"
        onClick={onClose}
      >
        <div
          className="max-w-2xl mx-auto mt-24 mb-10 px-6 cursor-default pointer-events-auto relative"
          onClick={(e) => e.stopPropagation()}
        >

            <button
              onClick={onClose}
              className="absolute -top-12 right-0 text-zinc-500 hover:text-white transition-colors p-2"
            >
              <span className="iconify" data-icon="lucide:x" data-width="24"></span>
            </button>
          )}

          <div className="flex flex-col md:flex-row gap-8 items-center mb-12">
            <img
              src="img/amanda-logo.jpg"
              alt="Amanda Castro Logo"
              className="w-32 h-32 rounded-full object-cover shadow-2xl border border-white/10"
            />
            <div>
              <span className="text-xs font-mono text-zinc-500 mb-2 block">SOBRE</span>
              <h2 className="text-4xl md:text-5xl font-semibold text-white tracking-tight">Amanda Castro</h2>
              <div className="flex gap-4 mt-4">
                <a href="https://www.instagram.com/castro.ilustra/" target="_blank" rel="noopener noreferrer" className="text-zinc-400 hover:text-white transition-colors flex items-center gap-2 text-sm">
                  <span className="iconify" data-icon="lucide:instagram" data-width="20"></span>
                  Instagram
                </a>
                <a href="https://www.behance.net/amandacastro41#" target="_blank" rel="noopener noreferrer" className="text-zinc-400 hover:text-white transition-colors flex items-center gap-2 text-sm">
                  <span className="iconify" data-icon="simple-icons:behance" data-width="20"></span>
                  Behance
                </a>

          </div>

            <p>
              Designer Gráfico com 5 anos de experiência em projetos variados, atuando no Brasil. Disponível para trabalhos freelance e contratações em tempo integral.
            </p>
            <p>
              Ao longo da carreira, desenvolveu identidades visuais, peças para redes sociais, materiais editoriais e campanhas completas de branding, sempre com foco em comunicação visual impactante e alinhada ao propósito de cada marca.
            </p>
            <p>
              "Design é a ponte entre uma boa ideia e o mundo real." Com olhar criativo e atenção aos detalhes, Amanda transforma conceitos em experiências visuais memoráveis.
            </p>
          </div>

          <div className="mt-16 border-t border-white/10 pt-8">
            <h3 className="text-sm font-semibold text-white mb-2">Especialidades</h3>
            <ul className="text-sm text-zinc-500 grid grid-cols-2 gap-2">
              <li>Identidade Visual</li>
              <li>Design para Redes Sociais</li>
              <li>Branding &amp; Naming</li>
              <li>Layout Editorial</li>
            </ul>
          </div>

          {!showClose && onClose && (
            <div className="mt-16 flex justify-center pb-8 border-t border-white/5 pt-8">
              <Button onClick={() => onClose()} className="px-8 !rounded-full">
                <span className="iconify" data-icon="lucide:arrow-up" data-width="16"></span>
                Voltar à Galeria
              </Button>
            </div>
          )}
        </div>
      </motion.div>
    );

    const SERVICOS = [
      { titulo: "Identidade Visual", desc: "Criação de marcas para pequenos negócios e empreendedores, entregando designs modernos e funcionais que se destacam.", tag: "Design", icon: "lucide:pen-tool" },
      { titulo: "Social Media", desc: "Desenvolvimento de artes e conteúdos visuais criativos para redes sociais, focados em atrair e reter o público.", tag: "Digital", icon: "lucide:smartphone" },
      { titulo: "Branding Integrado", desc: "Construção base de uma marca: desde a identidade até o guia de estilos para aplicações em diversos cenários da comunicação.", tag: "Estratégia", icon: "lucide:target" },
      { titulo: "Material Editorial", desc: "Diagramação impecável e design profissional aplicado a revistas, catálogos, manuais e variados produtos impressos.", tag: "Print", icon: "lucide:book-open" },
    ];

    const MediaPage = ({ onClose }) => (
      <motion.div
        initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
        className="fixed inset-0 z-40 bg-black/90 backdrop-blur-xl overflow-y-auto cursor-pointer"
        onClick={onClose}
      >
        <div
          className="max-w-4xl mx-auto mt-24 mb-10 px-6 cursor-default pointer-events-auto relative"
          onClick={(e) => e.stopPropagation()}
        >
          <button
            onClick={onClose}
            className="absolute -top-12 right-0 text-zinc-500 hover:text-white transition-colors p-2"
          >
            <span className="iconify" data-icon="lucide:x" data-width="24"></span>
          </button>

          <span className="text-xs font-mono text-zinc-500 mb-4 block">SERVIÇOS &amp; PROJETOS</span>
          <h2 className="text-4xl md:text-5xl font-semibold text-white tracking-tight mb-12">O que ofereço</h2>

          <div className="grid md:grid-cols-2 gap-6">
            {SERVICOS.map((item, i) => (
              <div key={i} className="group border border-white/10 bg-zinc-900/50 p-6 rounded-xl hover:border-zinc-700 transition-colors">
                <div className="flex justify-between items-start mb-4">
                  <div className="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center text-white">
                    <span className="iconify" data-icon={item.icon} data-width="18"></span>
                  </div>
                  <span className="text-xs font-mono tracking-wider text-zinc-500 bg-white/5 px-2 py-1 rounded-md">{item.tag}</span>
                </div>
                <h3 className="text-xl font-medium text-white mb-2 group-hover:text-zinc-200">{item.titulo}</h3>
                <p className="text-sm text-zinc-400 mb-2 leading-relaxed">{item.desc}</p>
              </div>
            ))}
          </div>
        </div>
      </motion.div>
    );

    const CartPage = ({ cart, onRemove, onClose }) => (
      <motion.div
        initial={{ x: '100%' }} animate={{ x: 0 }} exit={{ x: '100%' }} transition={{ type: "spring", stiffness: 300, damping: 30 }}
        className="fixed inset-y-0 right-0 z-50 w-full md:w-[480px] bg-zinc-950 border-l border-white/10 flex flex-col shadow-2xl"
      >
        <div className="p-6 border-b border-white/10 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <button onClick={onClose} className="text-zinc-500 hover:text-white transition-colors p-1">
              <span className="iconify" data-icon="lucide:x" data-width="20"></span>
            </button>
            <h2 className="text-xl font-semibold text-white">Projetos Salvos</h2>
          </div>
          <span className="text-xs font-mono text-zinc-500">{cart.length} ITENS</span>
        </div>

        <div className="flex-1 overflow-y-auto p-6 space-y-6">
          {cart.length === 0 ? (
            <div className="h-full flex flex-col items-center justify-center text-zinc-500 space-y-4">
              <span className="iconify opacity-20" data-icon="lucide:briefcase" data-width="48"></span>

            </div>

            cart.map((item, index) => (
              <div key={`${item.id}-${index}`} className="flex gap-4">
                <div className="w-20 h-20 bg-zinc-900 rounded-lg overflow-hidden flex-shrink-0">
                  <img src={item.url} className="w-full h-full object-cover" />
                </div>
                <div className="flex-1 flex flex-col justify-between">
                  <div className="flex justify-between items-start">
                    <h3 className="text-white font-medium text-sm">{item.title}</h3>
                    <button onClick={() => onRemove(index)} className="text-zinc-500 hover:text-red-400 transition-colors">
                      <span className="iconify" data-icon="lucide:trash-2" data-width="14"></span>
                    </button>
                  </div>
                  <p className="text-xs text-zinc-500 truncate">{item.desc}</p>
                  <div className="flex justify-between items-end mt-2">
                    <span className="text-white text-xs font-medium uppercase tracking-wider">Projeto</span>
                  </div>
                </div>
              </div>
            ))
          )}
        </div>

        {cart.length > 0 && (
          <div className="p-6 border-t border-white/10 bg-zinc-900/30">
            <Button className="w-full">
              <span className="iconify" data-icon="lucide:mail" data-width="16"></span>
              Entrar em Contato
            </Button>
          </div>
        )}
      </motion.div>
    );

    function App() {
      const [view, setView] = useState('home');
      const [selectedItem, setSelectedItem] = useState(null);
      const [cart, setCart] = useState([]);
      const [isScrolledEnd, setIsScrolledEnd] = useState(false);
      const [hasScrolled, setHasScrolled] = useState(false);
      const scrollRef = useRef(null);

      const handleScrollToTop = () => {
        if (scrollRef.current) {
          scrollRef.current.scrollTo({ top: 0, behavior: 'smooth' });
        }
      };

      // Verificação de carregamento
      useEffect(() => {
        setTimeout(() => document.body.classList.add('loaded'), 1500);
      }, []);

      const handleImageClick = (item) => {
        setSelectedItem(item);
      };

      const addToCart = (item) => {
        setCart([...cart, item]);
        setSelectedItem(null);
      };

      const removeFromCart = (index) => {
        const newCart = [...cart];
        newCart.splice(index, 1);
        setCart(newCart);
      };

      return (
        <>
          <NavBar view={view} setView={setView} cartCount={cart.length} />

          <div className="fixed inset-0 z-0">
            <Canvas
              gl={{ antialias: false, toneMapping: THREE.ReinhardToneMapping }}
              camera={{ position: [0, 0, 2], fov: 50 }}
              dpr={[1, 1.5]}
            >
              <fog attach="fog" args={['#030303', 5, 25]} />
              <ambientLight intensity={0.5} />
              <Environment preset="city" blur={1} />

              <Suspense fallback={null}>
                <ScrollControls pages={4} damping={0.2}>
                  <SceneContent onImageClick={handleImageClick} onScrollStateChange={setIsScrolledEnd} setHasScrolled={setHasScrolled} scrollRef={scrollRef} />
                </ScrollControls>
              </Suspense>
            </Canvas>
          </div>

          <AnimatePresence>
            {selectedItem && (
              <ProductModal
                key="modal"
                item={selectedItem}
                isOpen={!!selectedItem}
                onClose={() => setSelectedItem(null)}
                onAdd={addToCart}
                onGoToCart={() => { setSelectedItem(null); setView('cart'); }}
              />
            )}
            {view === 'about' && <AboutPage key="about" onClose={() => setView('home')} />}
            {view === 'media' && <MediaPage key="media" onClose={() => setView('home')} />}
            {view === 'cart' && <CartPage key="cart" cart={cart} onRemove={removeFromCart} onClose={() => setView('home')} />}
            {view === 'home' && isScrolledEnd && !selectedItem && (
              <AboutPage key="about-auto" showClose={false} onClose={handleScrollToTop} />
            )}
          </AnimatePresence>

          {/* Coordinates Overlay Logic */}
          {view === 'home' && !selectedItem && (
            <div className="fixed bottom-8 right-8 z-30 flex flex-col items-end gap-1 pointer-events-none mix-blend-difference">
              <span className="text-[10px] uppercase tracking-widest text-zinc-500">Brasil</span>
              <span className="text-xs font-mono text-zinc-300">DISPONÍVEL</span>
            </div>
          )}

          {/* Mouse Scroll Indicator */}
          <AnimatePresence>
            {view === 'home' && !selectedItem && !hasScrolled && (
              <motion.div
                initial={{ opacity: 0 }}
                animate={{ opacity: 1 }}
                exit={{ opacity: 0 }}
                className="fixed bottom-12 left-1/2 -translate-x-1/2 z-30 pointer-events-none flex flex-col items-center gap-2"
              >
                <div className="mouse"></div>
                <span className="text-[10px] tracking-widest uppercase text-zinc-500 font-medium">Rolar</span>
              </motion.div>
            )}
          </AnimatePresence>
        </>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
